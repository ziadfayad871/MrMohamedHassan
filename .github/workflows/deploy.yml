name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore & Publish
        run: |
          Remove-Item -Path ./publish -Recurse -Force -ErrorAction SilentlyContinue
          dotnet publish src/MrMohamedHassan/MrMohamedHassan.csproj -c Release -o ./publish

      - name: Install Web Deploy
        run: choco install webdeploy -y --no-progress

      - name: Deploy
        shell: cmd
        run: |
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" ^
            -verb:sync ^
            -source:contentPath="%CD%\publish" ^
            -dest:contentPath=site79202,computerName=https://site79202.siteasp.net:8172/msdeploy.axd?site=site79202,userName=site79202,password=%DEPLOY_PASSWORD%,authType=Basic ^
            -allowUntrusted -enableRule:AppOffline
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
