name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/MrMohamedHassan/MrMohamedHassan.csproj

      - name: Publish
        run: |
          Remove-Item -Path ./publish -Recurse -Force -ErrorAction SilentlyContinue
          dotnet publish src/MrMohamedHassan/MrMohamedHassan.csproj -c Release --no-restore -o ./publish

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: site79189.siteasp.net
          username: site79189
          password: ${{ secrets.DEPLOY_PASSWORD }}
          local-dir: ./publish/
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/app_offline.htm
