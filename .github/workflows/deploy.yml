name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/MrMohamedHassan/MrMohamedHassan.csproj

      - name: Publish
        run: dotnet publish src/MrMohamedHassan/MrMohamedHassan.csproj -c Release --no-restore -o ./publish

      - name: Install Web Deploy
        run: choco install webdeploy -y --no-progress

      - name: Deploy
        shell: pwsh
        run: |
          $msdeploy = Get-ChildItem -Path "C:\Program Files" -Recurse -Filter "msdeploy.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $msdeploy) { throw "msdeploy.exe not found" }
          Write-Host "Found msdeploy: $msdeploy"
          & $msdeploy -verb:sync -source:contentPath="$pwd\publish" -dest:contentPath=site79189,computerName="https://site79189.siteasp.net:8172/msdeploy.axd?site=site79189",userName=site79189,password=$env:DEPLOY_PASSWORD,authType=Basic -allowUntrusted -enableRule:DoNotDeleteRule
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
